body:
  text: 明天台山幽溪沙門傳燈和南撰清紅螺山資福比丘達默和南集清紅螺山資福沙門達林和南訂講釋此論大科分三初總標論題二請加述意三分門立論初又二初論題二論主初又三初解淨土二解生無生三解論字初解淨土又四初辯四土二述緣起三明宗旨四顯勝益初又三初明四土名義二明四土染淨三明四土橫豎初又二初列名二辯義今初名者四土名字也四土者十界眾生所依之國土也土雖無量略攝為四初常寂光土二實報無障礙土三方便有餘土四凡聖同居土以四土攝十界者寂光是佛國土實報是菩薩國土方便是聲聞緣覺國土同居乃六凡國土二辯義又四初常寂光土乃至第四凡聖同居土今初常寂光土者乃諸佛所住三德秘藏也而分性修二德言性德者乃眾生本具之心性也梵網玄義云常即法身寂即解脫光即般若又三德皆常性無遷故三德皆寂離塵勞故三德皆光極明淨故如此三法不縱不橫名秘密藏此即下文論中所謂性體性量性具性體乃本具法身德性量乃本具般若德性具乃本具解脫德亦即三諦常即中諦寂即俗諦光即真諦即一而論三故非縱即三而論一故非橫非縱非橫不可思議故名秘密藏也此乃性德言修德者後文云修之者稱性照了也謂修空觀破見思稱真諦性成般若德修假觀破塵沙稱俗諦性成解脫德修中觀破無明稱中諦性成法身德也性修合論乃清淨法身之所遊居約性德理名土約修德智名身身土一如非二相也此無各各別異之致而實徧周別異界中以別異界離此別無安立處故二實報無障礙土實報無障礙土者稱乎實相真實果報故曰實報色心自在塵剎互含故曰無礙此土乃圓教四十一位別教地上大士之所遊居身能現土土亦現身不違法性勝妙莊嚴具如華嚴經所明法界安立海也又名分證常寂光土法身大士所居故三方便餘土方便有餘土者出三界外有淨土三乘聖人修方便道之所遊居故曰方便但盡見思未除別惑但離分段未免變易故曰有餘謂九人生於此土藏教二人謂聲聞支佛通教三人謂聲聞緣覺及六地以上菩薩別教三人十住十行及十迴向圓教一人即十信也此九人但修空觀斷見思之通惑別圓雖修假中無明未破未曾證實故曰方便亦名實報土乃三乘聖人之實報故四凡聖同居土凡聖同居土者本是凡夫有漏善不善不動業之所招感而聖人亦復同居故曰凡聖同居土也先明凡次明聖凡夫者謂三界九地也三界者謂欲界色界無色界也九地者謂一五趣雜居地二離生喜樂地三定生喜樂地四離喜妙樂地五捨念清淨地六空無邊處地七識無邊處地八無所有處地九非非想處地初五趣雜居者謂欲界內三途人道六欲諸天雜處故曰五趣雜居也二離生喜樂者初禪三天謂梵眾天梵輔天大梵天已離五欲發得初禪五支功德謂覺觀喜樂一心故曰離生喜樂地也三定生喜樂者二禪三天謂少光天無量光天光音天此三天又離初禪覺觀二支而得內淨喜樂一心四支功德故曰定生喜樂地也四離喜妙樂地者謂三禪三天少淨天無量淨天遍淨天此三天又離二禪之喜支而得三禪捨念慧樂一心五支功德故曰離喜妙樂地也五捨念清淨者謂四禪九天福生天福愛天廣果天此三乃凡夫天無想天此外道天無煩天無熱天善見天善現天色究竟天此乃五不還天三果聖人所居此九天又離三禪之樂支而得不苦不樂捨念一心之四支功德故曰捨念清淨地也已上四地名為色界謂以色蘊為界也六空無邊處地者楞嚴經云若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處識無邊處者諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處無所有處者空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處非非想處者識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名非非想處此四地皆無色蘊故曰無色界也又名二十五有謂四洲四惡趣六欲并梵天四禪四空處無想及那含此諸眾生皆是有漏因果故曰二十五有也此明凡夫下明聖人聖有二種謂權實實者謂藏四果通六地別十住圓十信通惑雖斷報身猶在故曰實聖權者謂此聖人或是寂光實報方便土人由大悲願力哀愍眾生示生此界非是業牽以此二種聖人與凡雜處故曰凡聖同居土也問同居土人有權實上三土亦有權實否答方便土二權一實若從同居斷惑而生如前九人總名一實若從寂光實報佛及菩薩為誘定性二乘及地前菩薩令入正位示居方便是名二權實報土中一權一實四十一位總名一實妙覺法佛現報身相名之為權寂光土中唯實無權以是諸佛所遊居故初明四土名義竟二明四土染淨四土染淨者觀經疏云五濁輕重同居淨穢體析巧拙有餘淨穢若第頓入實報淨穢分證究竟寂光淨穢妙宗釋云五濁者劫濁見濁煩惱濁眾生濁命濁此五濁輕所感同居則淨如極樂世界妙喜世界也五濁重者則薉如今娑婆世界也即娑婆亦分淨穢不同如四教凡位皆令濁輕所感皆淨而圓教輕濁感同居依正最淨言體析巧拙有餘淨穢者體者通教體空觀析者藏教析空觀通人智巧用觀則巧了達五陰當體本空不待分析而後知空以此體空智慧斷惑證真也藏人智拙用觀則拙必以四大五陰分析而後知人空以此析空智慧斷惑證真也然此土淨相亦寬析觀感薉可在三藏體觀感淨不專通人衍門三教對三藏析俱明體法通但空體別次第體圓不次第體三人生彼俱感淨相圓人最淨言次第頓入實報淨薉者次第者別教次第三觀也頓入乃圓教一心三觀也別人根鈍不了即中故先修空觀斷見思次修假觀斷塵沙後修中觀斷無明故曰次第三觀也圓人根利了達諸法唯一念心一念心具足諸法非一非諸亦一亦諸不斷而斷圓斷五住故曰一心三觀也而言淨薉者若論證實則唯一淨今約教道別十地不融所感則薉也言分證究竟寂光淨薉者分證指別妙覺究竟乃圓妙覺而分淨薉者別圓妙覺同證寂光若論斷惑別妙覺僅斷十二品無明則與圓二行齊猶屬分證位圓教斷惑則有四十二品乃名究竟故曰分證究竟寂光淨薉也三明四土橫豎論四土橫豎者約別圓二人論也豎論者出於同居乃入方便出於方便乃入實報出於實報而入寂光斷惑既淺深不同住處亦高下逈別橫論則不移當處所見自殊於同居土橫超上三土所謂見思斷盡即見方便塵沙斷盡分破無明即見實報亦得分見寂光無明斷盡即得了了見於寂光於方便土橫超上二謂實報寂光於實報土橫超一土謂寂光寂光土無復可超亦無橫豎又約諸佛菩薩及三乘聖人隨於己土橫豎自在寂光土能為眾生現下三土實報能現下二方便能現同居又同居土能示上三土方便能示上二土實報土能示寂光土也初辯四土竟二述緣起夫緣起者現前一念妄心乃一法界總緣起徹祖曰最初迷真起妄則曰一念妄動末後返妄歸真則曰一念相應是則起妄之後歸真之前更有何法能外此一念乎是故一念悟隨淨緣即佛法界緣起迷隨染緣即九法界緣起十方虗空是此一念迷昧一切國土是此一念澄凝四生正報乃此一念情想合離四大依報是此一念動靜違順唯依此念變現諸法離此念外無法可得原此一念本是法界從緣而起緣無自性全體法界故得橫遍十方豎窮三際離過絕非不可思議法爾具此威神法爾具此功用今以此念念於西方阿彌陀佛求生極樂淨土正當念時西方依正已在我之心中而我此心已在西方依正之內如兩鏡交光相含互照此橫遍十方之相也若約豎窮三際則念佛時即見佛時亦即成佛時求生時即往生時亦即度生時三際同時更無前後帝網珠光難齊全體南柯夢事略類一斑此理悟之最難信之最易但能直下承當終必全身受用可謂參學事畢所作已辦矣如或未能但當任便觀察隨分受用耳述緣起竟三明宗旨又四初直示唯心二進明萬法三絕待圓融四超情離見初又分四初約現等三量楷定唯心二約事理二門辯明具造三約名體同異揀定真妄四約本有現前折衷指點今初宗者綱宗旨謂旨趣須知一句阿彌陀佛以唯心為宗此唯心之義須以三量楷定三量者現量比量聖言量也現量謂親證其理也如羅什大師隨母入寺見佛鉢喜而頂戴之俄而念曰我年甚幼佛鉢甚重何能頂戴是念纔動忽失聲置鉢遂悟萬法唯心高麗唯曉法師來此土參學夜宿塚間渴甚明月之下見清水一汪以手掬而飲之殊覺香美至次日清晨乃見其水為墓中控出遂惡心大吐乃悟萬法唯心便回本國著述此皆現量親證也比量者借眾相而觀於義比喻而知也諸喻之中夢喻最切如夢中所見山川人物萬別千差皆不離我能夢之心離夢心外別無一法可得即此可以比喻而知現前一切萬法但唯心現也聖言量者三界唯心萬法唯識千經萬論皆如是說楷定唯心竟二約事理二門辯明具造言辯明具造者具謂理具造謂事造只此一念心中本具十界萬法即此一念心性隨緣能造十界萬法理具如金中本具可成瓶盤釵釧之理事造如工匠爐鎚之緣造成瓶盤釵釧之器又理具如中本具可成種種食物之理事造如水火人工之緣造成種種食物由有理具方有事造理若不具事何所造所以理具但具事造離理具外別無事造由有事造方顯理具事若不造爭知理具所以事造秪造理具離事造外別無理具也已辯具造竟三約名體同異揀定真妄言揀定真妄者佛法中有名同體異者有名異體同者名同體異如心之一名有肉團心有緣慮心有集起心有堅實心肉團心同外四大無所知識緣慮心通於八識以八種識皆能緣慮自分境故此則是妄集起心唯約第八以能集諸法種子能起諸法現行故此則真妄和合堅實心者即堅固真實之性乃離念靈知純真心體也今言唯心者乃唯堅實純真之心也名異體同者如諸經中所說真如佛性實相法界等種種極則之名皆此堅實純真心也已揀真妄竟四約本有現前折衷指點言折衷指點者以諸經皆言無始本有真心夫既曰本有即今豈無而今現有即本有也若無無始則無現前若離現前豈有無始是故不必高尊本有遠推無始但現前一念心之自性即本有真心也以現前一念全真成妄全妄即真終日隨緣終日不變離此現前一念之外豈別有真心可得哉古德云威音那畔不離今世門頭眾生現行無明即是諸佛不動智體其庶幾乎由上四義以顯唯心故一以唯心為宗也初直示唯心竟二進明萬法進明萬法者又一句阿彌陀佛以唯佛為宗以一切萬法既是心現全體唯心心無彼此心無分齊於十界萬法若依若正假名實法隨拈一法皆即心之全體皆具心之大用如心橫遍如心豎窮以唯心義成唯色唯聲唯香唯味唯觸唯法乃至唯微塵唯芥子一切唯義俱成一切唯義俱成方成真唯心義一切唯義不成但有唯心之虗名而無唯心之實義以一切唯義俱成故曰法無定相遇緣即宗唯微塵唯芥子尚可為宗八萬相好莊嚴之果地彌陀反不可以為宗也故以唯佛為宗第二進明萬法竟第三絕待圓融絕待圓融者又一句阿彌陀佛以絕待圓融為宗於十界萬法隨拈一法無非即心全體具心大用橫遍十方豎窮三際離於四句絕於百非獨體全真更無有外彌滿清淨中不容他一法既爾萬法皆然各約諸法當體絕待無外是為絕待又以十界萬法各各互遍各各互含一一交羅一一該徹彼彼無障無礙各各無壞無雜如當臺古鏡影現重重如帝網千珠迴環交攝此約諸法迭互相望是為圓融今合絕待圓融為一宗正絕待時即圓融正圓融時便絕待非離絕待別有圓融絕待絕待其圓融非離圓融別有絕待圓融圓融其絕待絕待圓融各皆不可思議今共合為一宗則不思議中不思議也第三絕待圓融竟第四超情離見超情離見者以但約諸法絕待離過絕非已超一切眾生情妄執著三乘賢聖所見差別若約諸法圓融圓該四句融會百非尤非凡情聖見之所能及故總立超情離見為宗初以唯心為宗次以唯佛為宗三以絕待圓融為宗末以超情離見為宗總此四重宗旨方是一句彌陀正宗宗旨豈易言哉第三明宗旨竟第四顯勝益夫見道而後修道修道而後證道此乃千聖同途千古不易之定論也然見道豈易言哉若依教乘必大開圓解若依宗門必直透重關然後得論其修道否則便為盲修瞎練不免撞牆磕壁墮坑落塹矣唯淨土一門則不然從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法但發願持名即得往生此乃佛心佛眼親知親見之境界非彼三乘賢聖所能知見也但當深信佛言依此而發願持名即是以佛知見為知見不必另求悟門也又餘門修道必悟後依法修習攝心成定因定發慧因慧斷惑所發之慧有勝有劣所斷之惑有淺有深然後方可論其退與不退唯此淨土門中唯以信願之心專持名號持至一心不亂淨業即為大成身後決定往生一得往生便永不退轉矣又餘門修道先須懺其現業若現業不懺即為障道則進修無路矣修淨業者乃帶業往生不須懺業以至心念佛一聲能滅八十億劫生死重罪故又餘門修道須斷煩惱若見思煩惱分毫未盡則分段生死不盡不能出離同居國土唯修淨業者乃橫出三界不斷煩惱從此同居生彼同居一生彼土則生死根株便永斷矣既生彼土則常常見佛時時聞法衣食居處出於自然水鳥樹林皆悉說法同居土中橫見上三土諸上善人俱會一處圓證三種不退一生便補佛位然則淨土一門最初省求悟門末後不待發慧不須懺業不斷煩惱至極省要至極徑捷及其證入至極廣大至極究竟學者當細心玩味而詳擇之毋以一時貢高失此殊勝最大利益也顯勝益竟大科解淨土已竟二解生無生又三初約教二揀收三破立今初言約教者四教皆有生無生義若不細揀則有儱伺之過約藏教者綱宗云諸行無常是生滅法生滅滅已寂滅為樂因滅會真滅非真諦滅尚非真況苦集道真諦在因果事相之外故依衍教判為偏真無生也約通教者諸法不自生亦不從他生不共不無因是故說無生解苦無苦而有真諦苦尚即真況集滅道此乃即真無生也約別教者真如法性隨緣不變在生死而不染證涅槃而非淨逈超二邊不即諸法此乃但中無生也約圓教者如來之藏不變隨緣隨緣不變隨拈一法無非法界心佛眾生三無差別在凡不減在聖不增此乃圓教圓超四句圓該四句不思議之無生也約教竟二揀收言揀收者謂揀去前三無生收入圓乘也何者藏教則生滅滅已寂滅為樂生滅者二十五有生滅法也寂滅者偏真涅槃生也無生在生滅之外此論生無生者乃即生之無生故非藏教之意也通教雖言生即無生不得意人終歸灰斷之果又藏通二教不言他方佛土此論乃他方淨土之生即是無生故又非通教之意也別教雖言他方佛土而但中之理不即二邊此論生無生者乃即二邊之生即中道無生故又非別教意也唯圓教即中之理即四土之生法當體即中圓離四句圓融四句謂生即無生也亦即亦生亦無生也亦即非生非無生也舉一即四全四即一故曰不可思議之無生正是此論之本旨故曰淨土生無生論也三破立破立者世人有偏執有生者偏執無生者偏執有生猶有往生之益而偏執無生者大端墮在緣影妄想以為唯心淨土自性彌陀故題曰淨土生無生論正破緣影之虗妄而立乎淨土之生即心性之無生也故古德云生則決定生去則實不去又曰因緣所生法我說即是空亦名為假名亦名中道義下文論云心具而造豈分能所即心是佛即佛是心即心是土即土是心能造因緣及所造法當處皆是心性故明此宗而求生樂土者乃生與無生兩冥之至道也解生無生竟三解論字梵語優波提舍此云論義裂網疏云謂問辯徵析剖斷開示令得決定之謂也問辯徵析乃教論剖斷開示乃行論令得決定乃理論又問辯徵析乃名字位中聞慧教行理剖斷開示乃觀行相似位中思慧教行理令得決定乃分證位中修慧教行理又約教乃世界悉檀之論約行乃為人對治悉檀之論約理乃第一義悉檀之論釋論題竟第二釋論主明者國號也朱氏而有天下稱為大明天台山浙江之山也在台州之北幽溪者地名在山內沙門者梵語或云桑門皆梵音不同什師云佛法及外道凡出家者皆稱沙門乃出家之都稱或翻息心瑞應經云息心達本源故號為沙門又云勤息謂勤求戒定慧息滅貪嗔癡今釋沙門有四教各分四種謂勝道沙門說道沙門活道沙門污道沙門若勤求藏通戒定慧息見思之心證三乘果乃藏通二教勝道沙門若從真起應說生滅無生二種四諦乃說道沙門若稟二教修七科道品乃活道沙門不然者乃污道沙門也別圓亦然傳燈乃論主之諱也謂傳真諦燈俗諦燈中諦燈次第燈一心燈今造此論乃傳西方唯心四土自性三身一心妙蓮燈也和南者梵云槃那寐或云槃談訛云和南也皆翻我禮即禮拜也撰者述也造也大師俗姓葉浙江衢州人少從進賢映庵禪師薙髮隨謁百松法師聞講法華恍有神會次問楞嚴大定之旨百松瞪目周視燈即契入百松以金雲紫袈裟授之一生修法華大悲光明彌陀楞嚴等懺無虗日卜居幽溪高明寺先有土人葉祺葬親寺後夢神云此聖道場地將有肉身菩薩大作佛事可速遷祺不信俄舉家病困懼而徙焉翌日燈至即其地立天台祖庭學侶輻輳嘗於新昌大佛前登座豎義眾聞石室天樂鏗鏘講畢乃寂而著作此論融會三觀闡揚淨土法門每歲修四三昧身先率眾精進勇猛註楞嚴維摩等經凡染翰必被戒衲前後應講七十餘期預知時至手書妙法蓮華經五字復高唱經題者再泊然而寂總標論題竟二請加述意又二初歸命請加二造論成益今初稽首能仁圓滿智無量壽覺大導師所說安養大乘經了義了義至圓頓妙德普賢觀自在勢至清淨大海眾馬鳴龍樹及天親此土廬山蓮社祖天台智者并法智古往今來宏法師我今皈命禮三寶求乞冥加發神識造論宏法必先歸命三寶者略有四義一順古先聖賢儀式故二令增長眾生福德善根故三不同外道議論無宗本故四顯示能歸所歸性空寂感應道交難思議故須知歸命有能歸所歸請加有能請所請先明能歸文中稽首者下拜首至地舉身業總攝三業也又言歸命者乃身命歸依也歸者投向義返還義生死海中唯三寶功德可作恃怙故應投向三寶體性即眾生現前介爾心性由無始來背覺合塵甘自逃背今背塵合覺復本心源故名返還命者依於色心連持不斷之所假立非有實法但為眾生迷情之所寶重隨順世間語言舉此總攝三業也將此最重之命投向住持三寶則為增上緣研此假立命根本不可得便返還一體三寶也能仁下所歸三寶又三先明佛寶二明法寶三明僧寶能仁圓滿智無量壽覺大導師者佛寶也初句明此土教主次句彼土導師梵語釋迦牟尼此云能仁寂默能仁表大悲不住涅槃寂默表大智不住生死乃悲智雙運立此嘉稱又能仁者姓也阿含云昔有輪王姓甘蔗氏聽次妃之譖擯四太子至雪山北自立城居以德歸人不數年間乃為強國父王悔憶遣使往召四子辭過不還父王三嘆我子釋迦因此命族又云住直樹林又號釋迦既於林立國即以林為姓寂默者字也本行經云又諸釋種立性憍慢多言及見太子悉皆默然王云宜字牟尼又能仁表大悲而有生緣悲法緣悲無緣悲寂默表大智而有一切智道種智一切種智今三悲究竟三智圓滿三悲為福德莊嚴三智為智慧莊嚴福慧雙足莊嚴法身故曰釋迦牟尼也無量壽者彼土接引導師也要解云梵語阿彌陀正翻無量本不可說本師以光壽二義收盡一切無量壽則豎窮三際光則橫遍十方橫豎交徹即法界體今言無量壽乃舉豎以攝橫也覺者謂自覺覺他覺滿悟性真常了惑虗妄名自覺運無緣慈度有情界名覺他窮源極底行圓果滿名覺滿也大導師者然佛具三身引物若行人至觀行相似位中不為見思所亂故感彌陀變化身及諸聖眾引歸同居方便二種淨土若至分證位中不為二邊所亂故感受用身及諸聖眾引歸實報寂光二種淨土然佛有四十八種大願又具三身普引故曰大導師也佛寶竟二明法寶所說者佛為能說經為所說安養者梵云須摩提此云安養又云清泰又云極樂乃永離眾苦第一安隱之謂大乘者大乃對小而言具體相用三大法華經云其車高廣眾寶莊校其車高故言體大其車廣故言相大眾寶莊校故言用大乘者車乘約喻為名運載為義而有三種謂理乘隨乘得乘體大為理乘相大為隨乘用大為得乘又所乘三大為理乘能乘三智為隨乘能所究竟為得乘經者梵云修多羅此云契經謂契緣契事契理契緣為教經契事為行經契理為理經又契緣故為世界悉檀之經契事故為為人對治二種悉檀之經契理故為第一義悉檀之經了義者謂了明第一義諦之理中道之理為理了明佛法界證窮此理為事了明安養諸經具此事理二了故曰了義中了義也至圓頓者謂圓教之理具四義故名圓謂圓妙圓融圓足圓頓今淨土法門念念之中圓轉五濁故妙圓淨四土故融圓見三身故足圓證三不退故頓帶業往生一生成佛可謂至圓至頓也法寶竟三明僧寶妙德者梵語文殊師利或云曼殊室利此云妙德亦云妙吉祥謂文殊生時十事吉祥謂光明滿室甘露盈庭地湧七珍神開伏藏雞生鳳子猪娩龍豚馬產麒麟牛生白澤倉變金粟象具六牙具此十瑞故曰妙吉祥生於舍衛國多羅聚落梵德婆羅門家從母右脅而生身紫金色墮地能語尋於佛所出家首楞嚴三昧經過去無量阿僧祇劫南方世界名平等佛號龍種上尊王如來即文殊是央掘經言現在北方常喜世界歡喜藏摩尼寶積佛即文殊是悲華經言阿彌陀佛為轉輪王時第三王子名曰王眾於寶藏佛所發菩提心願於來世行菩薩道無有齊限莊嚴佛剎大寶填廁又無惡觸及諸女人及其名字佛即改王眾字號為文殊師利授記曰於未來世南方世界名曰清淨無垢寶窴成阿耨多羅三藐三菩提號曰普現如來普賢者梵云邲輸䟦陀悲華經云阿彌陀佛為轉輪王時第八王子名曰泯圖於寶藏佛前發願願於是不淨世界修菩薩行復當修治莊嚴十千不淨世界令得嚴淨如青香光明無垢世界亦當教化無量菩薩令心清淨皆趣大乘悉使充滿我之世界佛即改泯圖名號為普賢授記未來於北方知水善淨功德世界成阿耨多羅三藐三菩提號曰智剛吼自在相王如來觀自在者梵云阿那婆婁吉低輸此云觀世音又名觀自在現在西方極樂世界為補處菩薩悲華經云往昔劫中阿彌陀佛為轉輪王時觀世音菩薩為第一太子名曰不眴爾時寶藏如來為轉輪王授記已不眴太子前白佛言世尊今我以大音聲告諸眾生我之所有一切善根盡回向阿耨多羅三藐三菩提願我行菩薩道時若有眾生受諸苦惱恐怖等事退失正法墮大暗處憂愁孤窮無有救護若能念我稱我名字若其為我天耳所聞天眼所見是眾生等若不得免斯苦惱者我終不成阿耨多羅三藐三菩提世尊我今復當為眾生故發上勝願願轉輪聖王於安樂世界作佛事已入無餘涅槃乃至正法住時我於其中修菩薩道是佛正法初夜滅即其後夜成阿耨多羅三藐三菩提時寶藏佛尋為授記曰汝觀天人三惡一切眾生生大悲心欲斷眾生諸苦惱故欲令眾生住安樂故今當字汝為觀世音無量壽佛般涅槃已第二恒河沙阿僧祇劫彼土轉名一切珍寶所成就世界所有種種莊嚴無量無邊安樂世界所不能及汝於菩提樹下成阿耨多羅三藐三菩提號遍出一切光明功德山王如來勢至者梵語摩訶那鉢此云大勢至現在極樂世界第二補處菩薩也悲華經云昔阿彌陀佛為轉輪王時大勢至為第二太子名曰尼摩爾時寶藏如來為王及第一太子授記已第二王子亦白佛言世尊如我所有身口意業清淨福德盡以回向阿耨多羅三藐三菩提願遍出一切光明功德山王佛始初成道我當先請轉於法輪隨其說法所經時節於其中間行菩薩道是佛涅槃後正法滅已我於其後次第成於阿耨多羅三藐三菩提我作佛時所作佛事世界所有種種莊嚴般涅槃後正法住世悉如彼佛等無有異爾時佛告第二王子汝今所願取大世界如汝所願當於如是最大世界成阿耨多羅三藐三菩提號曰善住珍寶山王如來由汝願取大世界故因是字汝為得大勢馬鳴者梵語阿溼矩沙此云馬鳴東天竺桑岐多國婆羅門得法於夜奢尊者嘗製大乘起信論末後勸人求生淨土曰眾生以住此娑婆世界自畏不能常值諸佛親承供養懼畏信心難可成就意欲退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道如修多羅說若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定聚後付法於迦毗摩羅尊者已即入龍奮迅三昧挺身虗空如日輪相還復本位而取涅槃龍樹者梵云那伽曷樹那此云龍樹南天竺國梵志之裔得法於迦毗摩羅尊者意欲廣演經教時大龍菩薩即以神力接入龍宮開七寶函與諸方等經典九十日中通解甚多龍即送之出宮還天竺國大宏法施嘗造毗婆沙論論中有稱讚彌陀偈其略曰若人願作佛心念阿彌陀應時為現身是故我歸命彼佛本願力十方諸菩薩來供養聽法是故我稽首彼土諸菩薩具足諸相好以自莊嚴身我今皈命禮又造大智度論云菩薩常修念佛三昧因緣故所生常值諸佛如般舟三昧中說菩薩入是三昧即見生阿彌陀佛國後付法迦那提婆尊者已入三昧如蟬蛻而去按入楞伽經佛告大慧云大慧汝當知善逝涅槃後未來世當有持於我法者南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂國自世尊入寂七百年而龍樹出世適符佛記天親者梵云婆藪盤豆此云天親言天親者菩薩乃毗紐天親也北天竺富婁叉國人於一切有部出家受業樂聞小乘輒毀大乘經典後聞其兄無著誦十地經聞已感悟追悔前愆欲自斷舌無著止之曰昔以舌毀大乘今以舌讚大乘補過自新猶為善矣斷舌絕言其利安在天親於是精研覃思製大乘論凡百餘部並行於世所製無量壽經論開示淨土立五念門一禮拜二讚歎三作願四觀察五回向冠以偈曰世尊我一心歸命盡十方無礙光如來願生安樂國我作論說偈願見彌陀佛普共諸眾生往生安樂國平居兼修兜率觀願覲慈氏後捨壽經六月現形告無著曰吾已生慈氏前矣廬山蓮社祖者慧遠大師也師姓賈氏雁門樓煩人幼而好學博綜六經尤善莊老時道安法師建剎太行恒山遠往歸之聞講般若經豁然開悟因投簪受業精思諷誦以夜繼晝安歎曰使道流東國者其在遠乎晉太元六年過潯陽見廬山閒曠可以棲止乃立精舍號龍泉寺時遠同門慧永先居廬山西林欲邀同止而遠學侶寖眾西林隘不可處刺史桓伊為遠更立寺山東遂號東林遠於是率眾行道鑿池種蓮於水上立十二葉蓮華因波隨轉分刻晝夜以為行道之節既而四方清信之士聞風而至者百二十三人遠曰諸君之來能無意於淨土乎乃造西方三聖像建齋立社令劉遺民著發願文勒之石居山三十年跡不入俗專志淨土澄心觀想三見聖像而沉厚不言義熙十二年七月晦夕於般若臺之東龕方從定起見阿彌陀佛身滿虗空圓光之中有諸化佛觀音勢至左右侍立又水流光明分十四支回注上下演說苦空無常無我之音佛告遠曰我以本願力故來安慰汝汝後七日當生我國又見社中先化者佛陀耶舍慧持慧永劉遺民等皆在側前揖曰師早發心何來之晚遠謂弟子法淨惠寶曰吾始居此山十一年三覩聖像今復再見吾生淨土必矣即自製遺戒八月六日端坐入寂年八十三天台智者乃天台山智顗大師也字德安姓陳潁川人母孕時夢香煙五采縈繞懷抱及誕室內光明洞然眼有重瞳臥必合掌坐必向西少長見像即禮逢僧必敬年十八歲投湘州果願寺法緒出家誦法華經兼通律藏性樂禪悅詣光州大蘇山禮慧思禪師思一見曰昔日靈山同聽法華宿緣所追今復來矣即示以普賢道場為說四安樂行顗乃於此山修法華三昧始經三夕誦至藥王品是真精進是名真法供養如來身心豁然寂然入定照了法華達諸法相陳光大元年初至金陵居瓦官寺創宏禪法太建七年往臨海天台山結庵於北峯居焉未幾奉詔入金陵陳亡去之廬山又周遊荊揚間隋開皇十四年歸天台前後造寺三十六所佛像八十萬軀親度僧一萬四千人贖魚溪梁六十餘所作放生池表聞於朝嚴禁採捕龍天致敬道俗向化法教於斯大盛晉王廣從受菩薩戒奉以名曰智者嘗作淨土十疑論觀經疏等顗化緣既畢往剡東石城寺謂弟子曰吾當卒於此矣命施牀東壁面向西方專稱阿彌陀佛觀音及般若名又令多然香火唱無量壽佛經及觀經題竟弟子請云未審大師證入何位沒此何生顗曰吾不領眾必淨六根損己利人但證五品吾諸師友今從觀音勢至皆來迎我言訖端坐如入三昧年六十七開皇十七年十一月二十四日也法智者名知禮字約言明州金氏子其父母禱佛求嗣夢神僧𢹂一童子𢌿之曰此佛子羅睺羅也未幾生禮七歲喪母號哭不絕白父求出家遂往太平興國寺依洪選師得度稍長依寶雲寺義通法師學教觀圓頓之旨一受即了湻化中通既歸寂受請主乾符寺尋徙保恩院敷揚教觀學徒踵至明州旱禮與慈雲式公修光明懺約三日不雨當自焚一手如期果大雨大中祥符三年重建保恩賜名曰延慶六年建念佛施戒會親為疏文以勸念佛結萬人以為一社心心繫念日日要期每歲仲春同集一處同修供養同聽法音會彼萬心以為一志俾成淨業誓取往生自此二月望日每歲舉會以為常嘗集十僧修法華懺三年期以懺畢焚身供養妙經求生淨土後為眾沮不果復集十僧修大悲懺三年然三指供佛天禧四年駙馬李遵勗奏禮高行賜號法智大師敕令住世演教禮以從上諸祖闡揚淨土多談事相罕示觀門暫被時機未窮圓頓因取天台觀無量壽經疏研極理奧曲暢元風成妙宗鈔數萬餘言其餘撰述多指歸淨土妙宗最切時方詔天下立放生池禮歲遇佛生日結放生會集眾作法天聖六年正月元日將示寂建光明懺七日至五日結跏趺坐召大眾說法畢驟稱阿彌陀佛數百聲奄然而逝年六十九露龕二七日爪髮加長闍維時舌根不壞若蓮花然上能歸所歸竟下能請所請我今皈命禮三寶者能請也求乞冥加發神識所請也能請具四感所請具四應感應四句釋在後文此中感為顯感冥加乃法身冥應也發神識者求乞三寶加其智慧也皈命請加竟二造論成益敬採經論秘密旨闡明淨土生無生普使將來悟此門斷疑生信階不退上二句明造論下二句乃成益也秘密旨者三德密藏之旨三德者法身般若解脫名為三皆具常樂我淨名為德此三不縱橫不並別不可思議故曰秘密涅槃云安置諸子秘密藏中我亦不久自住其中故知自他初心無不皆修自他後心無不皆入即下文一念心性圓三諦理以圓三觀而證入所謂常寂光土也闡明者發明也淨土生無生者謂因緣所生法全體即中道無生也普使將來悟此門斷疑生信階不退者疑雖無量大略有三一者邪疑但信緣影之虗妄不信佛土之唯心二者偏疑但信偏空之真不知妙有之俗三者漸疑但信修德之漸不知性德之橫今悟此門則斷邪疑生正信斷偏疑生圓信斷漸疑生頓信不退有三一位不退入聖流不墮凡地二行不退恒度生不墮二乘地三念不退心心流入薩婆若海今入此門念念中圓斷三疑圓生三信圓證三不退也第二請加述意竟第三分門立論於中又二初分門二立論今初將造此論立為十門一一真法界門二身土緣起門三心土相即門四生佛不二門五法界為念門六境觀相吞門七三觀法爾門八感應任運門九彼此恒一門十現未互在門徹祖曰十門大旨初明理具二明事造前二是總後八為別三四兩門偏顯性德五等諸門偏顯修德第九橫論第十豎論然於其間第五一門為最要以事理總別性修橫豎等義舉不外此一念以是全體法界故是故學者但能於此一門洞明則前後諸門盡在是矣又此十科皆稱門者門以能通為義謂此十科門門皆通故下明立論先明第一初一真法界門又二初偈頌二論文今初一真法性中具足十法界依正本融通生佛非殊致此科明理具者謂眾生一念心性本具三千實相法華經云唯佛與佛乃能究盡諸法實相何謂諸法實相所謂諸法如是相如是性等也謂此心中本具十法界十界各具十界共成百界每界又具十如是則成千如是故曰百界千如也又有假名一千實法一千依報一千則成三千此三千法不離一念妄心妄心既然妄境亦爾隨拈一香一華一塵一聲皆即三千實相是故依正融通生佛非殊也二論文分二初立義二防難初又三初總標二別釋三結成今初論曰一真法界即眾生本有心性此之心性具無量德受無量名若約性德隨拈一法皆即法界皆具無量德受無量名今言眾生心性者乃觀心釋謂心佛眾生三無差別若約佛法釋初機之人則疑太高若約眾生法又疑太廣故但就現前一念第六意識釋近而復要也眾生者謂五陰四大和合假曰眾生本有者本來非無強名曰有也心性者寂而常照強名曰心照而常寂強名曰性德者實有功能名者隨功立號也總標竟二別釋二初徵釋具德二徵釋受名初又四初分別三德二融會三德三會同三諦四引經證明初又二初總標二別明今初云何具無量德舉要言之謂性體性量性具二別明又三初明性體二明性量三明性具今初云何性體謂此心性離四句絕百非體性堅凝清淨無染不生不滅常住不壞離四絕百正顯體體性下四句明具德四句者謂有句無句亦有亦無句非有非無句百非謂上四句各具四句四四成十六句約三世則成四十八句已起四十八未起四十八則成九十六句加根本四句共為百句也而言離絕者謂此性體本離言說相離名字相離心緣相法華云是法非思量分別之所能解謂一落思量分別則不出四句若執四句則成外道四句邪見故般若云般若如大火聚四邊不可觸觸著便燒然亦不可定離墮絕言見若能融會之則般若如清涼池四門皆堪入道而成圓教四門故起信論云復次真實空者從本已來一切染法不相應故離一切法差別相故無有虗妄分別心故應知真如非有相非無相非亦有亦無相非非有非無相非一相非異相非亦一亦異相非非一非異相略說以一切眾生妄分別心不能觸故立為空據實道理妄念非有空性亦空以所遮是無能遮亦無故下明具德體性堅凝我德也我者主宰義能為主故不被所破故曰堅凝顯心性乃十界萬法之主清淨無染淨德也謂本性清淨無五住之惑染不生不滅樂德也謂本無分段變易二種生滅故常住不壞常德也又四句各具四德明性體竟二明性量云何性量謂此心性豎窮三際橫遍十方世界有邊虗空無邊虗空有邊心性無邊現在有邊過未無邊過未有邊心性無邊無盡無盡無量無量三際者過去現在未來為三世過去亦具三謂過去過去過去現在過去未來現在亦具三謂現在過去現在現在現在未來未來亦具三謂未來過去未來現在未來未來加根本一世則成十世古德云十世古今始終不離於當念故曰豎窮三際也十方者約正報則為十界約依報則曰十方據華嚴經此世界海有須彌山微塵數風輪所持能持寶光牟尼香水海此香水海出大蓮華名種種光明蕊香幢此世界住在其中此世界金剛輪圍山內所有大地中有十不可說佛剎微塵數香水海此香水海中各有大蓮華一一蓮華各有世界種於中安住一一世界種各有二十重華藏世界次第布列如此十不可說佛剎微塵數香水海雖多不出一念心性之相分故曰無邊剎海自他不隔於毫端故曰橫遍十方也世界有邊等四句釋橫遍義謂上佛剎微塵數香水海中重重世界雖多總不出虗空外故曰世界有邊虗空無邊也虗空有邊心性無邊者虗空有相心性無相故楞嚴經云空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有又曰十方虗空生汝心內猶如片雲點太清裏故曰虗空有邊心性無邊也現在有邊等四句釋豎窮義現在有邊者過去未來乃現在之邊際故過未無邊者過未無盡故過未有邊心性無邊者經云心生種種法生心滅種種法滅心生乃過去邊際心滅乃未來邊際故曰過未有邊心性本無生滅故曰無邊也無盡無量者總結也上句結豎下句結橫無盡者謂非有盡之無盡乃離四句絕百非之無盡無量亦然明性量竟三明性具又三初明假名二明正報三明依報今初而言假名者乃十法界各各名字謂此名字依正報實法而立謂佛名字乃至地獄名字對實法而言故曰假名也云何性具謂此心性具十法界謂佛法界菩薩法界緣覺法界聲聞法界天法界修羅法界人法界畜生法界餓鬼法界地獄法界此是假名釋此假名又二初略釋假名二略明法界謂此心性具十法界者謂具假名實法依報三千法也梵云佛陀此云覺者謂自覺覺他覺滿自覺異凡夫覺他異二乘覺滿異菩薩佛則三覺圓萬德備故名覺者梵云菩提薩埵此云覺有情約自行則雖然覺悟而情念未盡故曰覺有情約化他則為覺悟有情眾生也梵云辟支迦羅此翻緣覺而有二種若出有佛世修十二因緣觀悟道名緣覺若出無佛世無師自悟則名獨覺聲聞者大乘則以佛道聲令一切聞故曰聲聞小乘則聞佛四諦音聲而悟道故曰聲聞梵云提婆此云天天者天然為常受天然之樂故云天此攝六欲四禪四空梵云阿修羅此云無端正男醜女美又翻非天謂似天而非天也而有天人鬼畜四類梵云摩㝹舍喃此云人人者忍也謂能安忍違順也此該四洲梵云底栗車此云畜生此該水陸空三種梵云閃多此云鬼謂有財少財無財等梵云泥犂耶此云無有謂無樂有苦地獄乃此方約義立名謂地下之獄故名地獄此分大小寒熱等不同此略釋假名二釋法界有三義謂十數是能依法界是所依能所合稱故言十法界又此十法界各各因各各果不相混濫故言十法界又此十法一一當體是法界故言十法界釋假名竟二明正報復有正報謂佛五陰菩薩五陰乃至地獄五陰此是實法正報者謂無明為因業為緣所感名色即指此名色乃正感之報故曰正報言名色者謂第八識投胎時識心無相但有其名故曰名父精母血有質之法故曰色五陰者開名色二法而為五開名為受想行識四陰色即色陰陰者陰蓋義蓋覆法身故又名五蘊蘊者積聚義積聚生死故佛五陰者非漏非無漏法性五陰謂真善妙色第一正受無上妙慧真性解脫一切智見菩薩五陰者謂亦有漏亦無漏五陰淨不淨色樂無樂受我無我想行常無常識緣覺聲聞無漏五陰謂戒定慧解脫解脫知見人天善有漏五陰四惡趣惡有漏五陰此是實法者對假名而言也正報竟三明依報復有依報謂佛國土菩薩國土乃至地獄國土依報者乃十界眾生所依住故又依正報所感故佛國土者謂佛所依常寂光淨土菩薩國土分三若圓別菩薩無明破者居實報國土亦分入寂光國土若見思盡者依方便國土若未盡者依人天住通菩薩惑盡者依方便國土未盡者依人天住藏菩薩依人天住聲聞緣覺惑盡者依方便住未盡者依人天住天依宮殿住人依地住修羅依海底海畔住畜生依地水空住鬼依糞穢火住八寒八熱乃地獄國土此上十界界各具十共成百界又各具十如是共成千如是復有假名一千正報一千依報一千共成三千又理具三千事造三千兩重三千同居一念故曰性具也明性具竟已上分別三德竟二融會三德令易解故作此三種分別得意為言即性具是性體性量性體離過絕非即性具十界離過絕非性體堅凝清淨無染不生不滅常住不壞性具十界亦然性量豎窮橫遍無盡無盡無量無量性具十界亦然正報五陰同性體性量清淨周遍依報國土亦然融者和也謂和會三德也釋此又二初會假名二例依正初又二初總次別令易解故作此三種分別得意為言即性具是性體性量此乃總融會也下乃別會又二初融會體具次融會量具文云性體離過絕非即性具十界離過絕非者此顯現前事法界一切諸法隨拈一香一華乃至一微塵一芥子皆是性體皆離四句皆絕百非也性體堅凝清淨無染不生不滅常住不壞性具十界亦然者乃顯隨拈一香一華乃至微塵芥子皆是常樂我淨四德也此乃融會體具下融會量具性量豎窮橫遍無盡無盡無量無量性具十界亦然者乃隨拈一香一華皆豎窮橫遍無盡無量也此足顯事事無礙法界也此融會假名竟下例明依正也正報五陰同性體性量清淨周遍此乃例明正報也謂十界正報五陰乃至地獄極惡五陰亦是性體離過絕非體性堅凝清淨無染不生不滅常住不壞亦是性量之豎窮橫遍無盡無量也依報國土亦然者例明依報也謂乃至地獄極惡依報隨拈一法皆是性體離過絕非體性堅凝清淨無染不生不滅常住不壞亦是性量之豎窮橫遍無盡無量也故偈云依正本融通生佛非殊致也此融會三德竟三會同三諦此之三法亦名三諦性體即中諦性量即真諦性具即俗諦諦者謂自性不虗故稱為諦又見此三諦得不顛倒覺故稱為諦又能以此示於他故稱為諦中諦者統一切法之謂也故下文云離即離非是即非即也真諦者泯一切法也故下文云一切俱非也俗諦者立一切法也故下文云一切俱即也會同三諦竟四引經證明又二初引三藏文證二引七大文證初又三初引空如來藏二引不空如來藏三引空不空如來藏今初故楞嚴經云而如來藏妙明圓心非心非空非地水火風非眼耳鼻舌身意非色聲香味觸法非眼界乃至非意識界非無明乃至非老死非無明盡乃至非老死盡非苦集滅道非智非得非檀那乃至非般剌若非怛答阿羯非阿羅訶非三藐三菩非常樂我淨此即性量無相是為真諦大佛頂文句云此正顯心性正隨緣而成十界染淨諸法而染淨法中隨拈一法皆即豎窮橫遍無盡無量之圓融大真諦也一切俱非者即藏性如實空義正隨緣而常不變也言如來藏妙明圓心者隨緣不變名為如不變隨緣名曰來唯是一心名曰藏不可思議故曰妙性自靈知故曰明豎窮橫遍故曰圓重在圓字為顯性量然此三諦有橫有豎豎則即橫論豎橫則即豎論橫今云一切俱非乃即豎論橫也首言非心者即指心法次非空乃至非般剌若指眾生法次如是乃至非常樂我淨即指佛法意顯心佛眾生三無差別約真諦而論故曰一非一切俱非也若即橫論豎豎中亦具三諦眾生法中非空至非意識界是六凡法屬俗諦非無明乃至非老死非無明盡乃至非老死盡是緣覺法非苦集滅道非智非得乃聲聞法此二屬真諦緣覺法中非無明乃至非老死乃流轉門非無明盡乃至非老死盡乃還滅門聲聞法中苦集滅道乃生滅四諦非智非得乃聲聞之果非檀那乃至非般剌若及六波羅蜜是菩薩法非怛答阿羯至非常樂我淨乃佛法此二屬中諦梵云怛答阿羯此云如來阿羅訶此云無生三藐三菩此云正徧知今一切俱非所謂一空一切空假中皆空不思議大真諦也空如來藏竟二引不空如來藏而如來藏元明心妙即心即空即地水火風即六凡即二乘乃至即如來常樂我淨此即性具十界是為俗諦此文略若約全文云以是俱非世出世故即如來藏元明心妙即心即空等也以是俱非世出世者結上起下非六凡故非世非四聖故非出世由其一切俱非所以一切俱即即者是也此顯染淨諸法隨拈一法無不具足三千實相是圓融俗諦一切俱即即藏性如實不空義正隨緣而常不變也元明心妙重一妙字為顯性具心佛眾生三無差別一即一切俱即又三諦俱即所謂一假一切假空中皆假不思議大俗諦也不空藏竟三引空不空如來藏而如來藏妙明心元離即離非是即非即此即性體統攝是為中諦文云以是俱即世出世故即如來藏妙明心元等以是俱即世出世故者結上起下由其俱非而又俱即所以即妙明心元此顯十界染淨諸法隨拈一法無不皆是離過絕非圓融中諦一切雙遮雙照即藏性遮照同時義正隨緣而常不變也妙明心元重一元字為顯性體統攝離即離非乃雙遮上文是即非即乃雙照上文心佛眾生三無差別一遮照一切遮照又三諦俱遮俱照即所謂一中一切中空假俱中不思議大中諦也引三藏文證竟二引七大文證又云如來藏性色真空性空真色清淨本然周遍法界地水火風空見識莫不如是地水火風空見識即性具也清淨本然性體也周遍法界性量也又地水火風空清淨本然周遍法界即依報國土性體性量也見識清淨本然周遍法界即正報五陰性體性量也此中文分二節又云如來藏性色真空至莫不如是乃引經文下乃釋義證成經中地大則曰性色真空性空真色清淨本然周遍法界空大則曰性覺真空性空真覺見大則曰性見覺明覺精明見總攝聞覺知識大則曰性識明知覺明真識妙覺湛然周遍法界文雖少差不出二諦故曰莫不如是也下乃釋成又二初總次別地水火風空見識乃總十法界依正二報故曰性具也七大各各清淨本然離過絕非故為性體各各周遍法界故為性量也下乃別釋謂別其依正各具三諦也引經證明竟大科徵釋具德已竟二徵釋受名云何受無量名舉要言之此之心性或名空如來藏或名真如佛性或名庵摩羅識或名大圓鏡智或名菩提涅槃性體性量名空如來藏即性具十界五陰國土名空如來藏性體性量名真如佛性即性具等名真如佛性性體性量名庵摩羅識即性具等名庵摩羅識性體性量名大圓鏡智即性具等名大圓鏡智性體性量名菩提涅槃即性具等名菩提涅槃文分二段初略引七名一法不立名空如來藏不妄不變名真如離過絕非名佛性洞照萬法名大圓鏡智諸佛所得名菩提寂靜無為名涅槃分別一切而無染名庵摩羅識此云清淨識二融會七名性體性量名空如來藏即性具等名空如來藏者謂性具十界依正隨拈一法皆名空如來藏等也又既論十界必分六即謂理即空如來藏乃至究竟空如來藏故下文明初後心也真如佛性等準知第二別釋竟三結成故曰一真法性中具足十法界依正本融通生佛非殊致大科立義竟二防難又二初問二答初又二初雙開二心二初後互難今初問曰此一真法界為初心是為後心是初心者理即位後心者究竟位言六即者六明事相因果無差即顯理性初後體同無機子曰癡禪任性濫上聖以矜高狂慧隨情居下凡而自屈由是天台大師明六即佛破二種見揀其太過六分因果之事殊收彼不收即顯聖凡之理等六即頌曰動靜理全是行藏事盡非冥冥隨物去杳杳不知歸此頌理即佛也方聽無生曲始聞不死歌今知當體是翻恨自蹉跎此頌名字即佛念念照常理心心息幻塵徧觀諸法性無假亦無真此頌觀行即佛四住雖先落六塵未盡空眼中猶有翳空裏見華紅此頌相似即佛豁爾心開悟湛然一切通窮源猶未盡尚見月朧此頌分證即佛從來真是妄今日妄皆真但復本時性更無一法新此頌究竟即佛今雙開二心乃以事難理也二初後互難若初心是應無七名若後心是應無九界初後俱墮立義不成應無七名者不達七名各具六即應無九界者不達佛證窮十界二答又二初略明二詳釋今初答曰此正顯初心是以初心是故方有後心是以後心是故方顯初心是言初心後心者有初有初初有後有後後初者因也初初者因性也後者果也後後者果性也若論事相則初後天淵若論理性則因果一體今一真法界乃十界之性故初後俱是也二詳釋又三初以初證後非無九界二聖凡六即辯其初後三以後證初非無七名今初云何以初心是故方有後心是如果地依正融通色心不二垂形九界方便度生悉由證此因心所具故曰諸佛果地融通但證眾生理本故得稱性施設無謀而應若不然者何異小乘外道作意神通果地依正融通色心不二者果地乃妙覺果謂後心也此地以如如理為依報如如智為正報理智不二故依正融通身土一如故色心不二也垂形九界方便度生者方者法也便者用也謂佛於九法界中示十界之形像又用四教十六門六十四悉檀方便引九界眾生同證理性也悉由證此因心所具者乃證窮十界因心所具三諦之理證真諦而得般若之相證俗諦而得解脫之用證中諦而得法身之體故荊溪大師云諸佛果地融通但證眾生理本也稱性施設無謀而應者稱真諦性施設藏通二教稱俗諦性施設別教稱中諦性施設圓教或頓施或漸施或秘密施或不定施曲盡其宜無方不可皆是無心而應物故曰無謀而應也作意神通者謂起心作意始有通也通有六種謂天眼天耳宿命他心神足漏盡此六通又有修得報得鬼天報得五通外道因根本禪發得五通三乘依八背捨八勝處等修得五通證果時得漏盡通圓教依法華經云諸根通利智慧明了即諸根互用乃中道之通今無謀而應即中道之通不須作意任運成就故亦名無記化化禪以初證後竟二聖凡六即辨其初後故法智大師曰六即之義不專在佛一切假實三乘人天下至蛣𧏙地獄色心皆須六即辯其初後所謂理蛣𧏙名字蛣𧏙乃至究竟蛣𧏙以論十界皆理性故無非法界一不可改故名字去不唯顯佛九亦同彰至於果成十皆究竟妙宗云六種即名皆事理體不二義而事有逆順名字等五順修事唯理即一純逆修事此逆順事與本覺理體皆不二體既不二其逆順名自何而立以知不二事皆合理名之為順其不知者事皆違理故名為逆名字等五皆知皆順若初理即唯迷唯逆而迷逆事與其覺理未始暫乖故名即佛以全體是故免於退屈六分別故免於上慢六不離即即不離六六即義成圓位可辯又六即辯位有權有實若權論者前三教亦論六即乃至四惡趣以十二因緣亦可辯其初後雖具六即乃權論耳又不能言六即佛也若據實而判者若知實理者攝入名字位中其未知者盡在理即位中故妙宗云未得圓聞齊別內凡尚屬理即以七方便未解妙名豈知即佛此中判位唯約圓判也蛣𧏙者𧏙螂蟲也理蛣𧏙等者以劣例勝也謂乃至地獄一色一心尚論六即何況佛也以論十界皆理性故無非法界一不可改者問何以地獄色心乃至蛣𧏙皆以六即辯其初後答曰以論十法界當體全是本覺理性無非一真法界全體故曰一一不可改此乃明其圓人所悟不二之理前三教人全然不知況其餘也名字去不唯顯佛九亦同彰者從名字位至分證位不但佛性顯乃至地獄性蛣蜣性假名性正報性依報性微塵芥子性一顯一切顯故云發心住者一發一切發也至於果成十皆究竟者究竟位中佛究竟菩薩亦究竟乃至地獄一色一心一切皆究竟也辯初後竟三以後證初非無七名云何以後心是故方顯初心是正由後心果地全證眾生理本故果地七種名目悉是眾生性德美稱但眾生在迷故無此稱尅論性德豈可言無故初後俱善立義成矣性德者心性本有功能也美稱者美名也謂既有此功能便有此美名也眾生在迷者迷有二種謂界內眾生迷於事界外眾生迷於理由此二迷不悟性德故無此美名也防難竟第一一真法界門竟二身土緣起門又二初偈頌二論文今初一真法界性不變能隨緣三身及四土悉由心變造一真法界性不變能隨緣者謂一念心性之體雖不變而用能隨緣譬如虗空雖非羣相而不拒彼諸相發揮暗相發揮喻九界緣起明相發揮喻佛界緣起雖然發揮虗空常自不變雖然不變不拒發揮故曰正隨緣而常不變正不變而常隨緣也三身四土者十界皆具三身九界苦即法身惑即報身業即化身也二論文分二初正辯緣起二結示淨宗初又二初唯心變造二變造唯心今初論曰一真法界性即前文所明性體性量性具也教中說真如不變隨緣隨緣不變者正由性體性量即性具故如君子不器善惡皆能故晉譯華嚴經云能隨染淨緣具造十法界謂真如性中所具九法界能隨染緣造事中九法界真如性中所具佛法界能隨淨緣造事中佛法界所以能者正由性具性若不具何所稱能天台家言正由理具方有事用此之謂也釋初句可知教中下釋不變能隨緣引佛語也真如者乃心性之異名不妄不異之義也正由性體性量即性具故者譬如虗空體虗空量即明暗二境故心性亦然全鬼性體性量即所見之火人性體量即水六凡體量即同居二乘即方便菩薩即實報佛即寂光如君子不器善惡皆能者引世間法例出世間法也儒云君子不器者不為一才一藝所能局也例出世間者君喻性體子喻性量器喻性具有正報器依報器又有善器惡器有漏器無漏器亦有亦無漏器非有非無漏器體量之君子無所不能故曰不器也晉譯華嚴經下引經證明初引華嚴宗二引台宗梵語佛陀䟦陀羅此云覺賢大乘三果人甘露飯王之苗裔此土與羅什相見什有所疑多就咨決東晉義熙十四年於謝司空寺譯華嚴經六十卷堂前池內有二童子常從池出捧香散華謂真如下釋經義也真如性中所具九法界等者謂一念心性中本具六凡見思惑能隨有漏業緣造事中六凡法界心性中本具二乘塵沙惑能隨無漏業緣造事中二乘法界心性中本具菩薩無明惑能隨亦有漏亦無漏緣造事中菩薩法界真如性中所具佛法界等者謂一念心性中本具如來智慧能隨非有漏非無漏緣造事中佛法界所以能者乃心性之妙用也性若不具何以顯其妙哉天台下又引台宗證成也唯心變造竟二變造唯心是知事中十法界三身四土悉由真如隨緣變造既曰真如不變隨緣隨緣不變則事中染淨身土當體即真無一絲毫可加損於其間者楞嚴經云見與見緣並所想相如虗空華本無所有此見及緣元是菩提妙淨明體是也此中二段初正明楞嚴下引證也事中十界者謂事法界也法界者一切眾生身心本體法者軌則義界具性分二義若約事說即分義若約理說即性義以此性分互相交絡則成四種法界義一者事法界謂十界眾生身心差別各有分齊二理法界謂十界眾生同一理體三理事無礙法界謂理由事顯事由理成理事互融名理事無礙四事事無礙法界者謂一一分齊事法稱性互融一多相即大小互容重重無盡名事事無礙也三身者法報化也十界各具三身謂九界苦即法身業即解脫即應化身惑即般若即報身得論六即佛界三身又論單複四土亦論亦即若依若正若單若複若凡若聖悉由真如隨緣而變造當體即真者謂事法界中隨拈一法當體即性體性量離過絕非豎窮橫遍也一法既爾法法皆然故得互相攝入主伴重重而成事事無礙法界也故曰無一絲毫法可加於其間可損於其間也楞嚴經下引證也見者十界八識能緣見分心法也見緣者十界八識所緣相分境法也所想相者眾生不了如幻妄起我法二執也如虗空華本無所有者不唯我法本空而且心境如幻也此見及緣元是菩提妙淨明體者謂心境二法唯一真如性體性量也正辯緣起竟二結示淨宗若然則娑婆極樂此世眾生當生九品彌陀已成吾心當果悉由心性之所變造心具而造豈分能所即心是佛即佛是心即心是土即土是心即心是果即果是心能造因緣及所造法當處皆是心性故明此宗而求生樂土者乃生與無生兩冥之至道也結示淨宗者謂結示唯心之宗唯佛之宗絕待圓融之宗超情離見之宗也此中二段初結唯心變造示生則決定生義二結變造唯心示無生則決定無生義也若然者承上文也娑婆極樂者明唯心變造之土也此世眾生當生九品者明唯心變造眾生也彌陀已成吾心當果者明唯心變造之佛也故曰悉由心性之所變造也下明無生義心具而造豈分能所者謂國土眾生及佛並是心中本具而今造出元無能生所生也即心是佛即佛是心則佛無生也即心是土即土是心則土無生也即心是果即果是心則果無生也亦眾生無生也能造因緣即十界之因也所造法即十界之果也當處皆是心性者因緣當處是心則因緣無生也果當處是心則果無生也以此而例唯心變造明其生則決定有生變造唯心明其無生決定無生若二義相成則決定亦生亦無生若二義互奪則決定非生非無生也若言有生乃唯佛之宗若言無生乃唯心之宗若言非生非無生乃絕待之宗若言亦生亦無生乃圓融之宗一句中圓該四句而又圓超四句而又正圓該時便圓超正圓超時便圓該圓超圓該同時無礙乃超情離見之宗故曰明此宗旨而求生樂土者乃生與無生兩冥之至道也若再例釋者亦是求也亦無求也亦非求非無求也亦亦求亦無求也亦求生也亦求無生也亦求非生非無生也亦求亦生亦無生也兩冥至道亦四冥至道亦五冥至道亦冥也亦不冥也亦亦冥亦不冥亦不冥亦非冥至道也身土緣起門竟三心土相即門又二初偈頌二論文今初西方安樂土去此十萬億與我介爾心初無彼此異即者是也謂即心是土即土是心也心者乃一念之見分也土乃相分見相唯是一心故曰此見及緣元是菩提妙淨明體云何於中有是非是也二論文分二初正辯相即二問答申明今初論曰佛說阿彌陀經云從是西方過十萬億佛土有世界名曰極樂百億日月百億須彌百億大海百億鐵圍山名一佛土十千為萬十萬為億一佛國土已自廣大況億佛土乎況十萬億乎是則極樂國土去此甚遠博地凡夫念佛求生彈指即到者正由生吾心所具之佛土也言介爾心者即凡夫念佛之心也剎那之心至微至劣故稱介爾謂十萬億遠之佛土居於凡夫介爾之心即心是土即土是心故曰初無彼此異百億日月等者乃明三千大千世界為一佛所化故為一佛土也三千謂小千中千大千也一日月一須彌一大海一鐵圍乃一四天下一千四天下為小千世界一千小千為中千一千中千為一大千世界一共有百億日月等也十千為萬下況顯其遠也博地下正明相即博地者大地也剎那者此云極少時一念中有九十剎那故曰極少一念心起必具四分所生之土乃相分能生之心乃見分見相唯一自證分及證自證分四分唯是一心故曰即心是土即土是心而無彼此也正辯相即竟二問答申明問曰介爾之心居於方寸博地疑團何能包許遠之佛土答曰介爾之心昧者謂小達人大觀真妄無二蓋此妄心全性而起性既無邊心亦無際性如大海心如浮漚全海為漚漚還匝海蓋真如不變隨緣隨緣不變既曰隨緣不變豈可以真妄而局大小哉方寸者肉團心也此心方圓不出寸許故曰方寸乃五臟中心臟浮塵意根俗云神藏於心故曰居於方寸亦第八識相分答中言真妄無二者真謂真性妄謂妄心性乃不變之體心乃隨緣之用體用不二也妄心全性而起者謂全豎窮橫遍之性起為介爾之心全介爾之心即豎窮橫遍之性故曰性既無邊心亦無際也性如大海更以喻釋也文可知心土相即門竟四生佛不二門又二初偈頌二論文今初阿彌與凡夫迷悟雖有殊佛心眾生心究竟無有二二論文分四初生佛分於迷悟二迷悟依於心性三心性體不受迷四稱性行無虗棄今初論曰阿彌陀佛者果人也成就三身四智十力四無所畏十八不共等功德凡夫者因人也具足無量恒沙煩惱造作無量恒沙業繫當受無量恒沙生死迷悟之相譬彼雲泥三身者梵語毗盧遮那此云遍一切處華嚴云法身徧在一切處一切眾生及國土三世悉在無有餘無有形相而可得梵語盧舍那此云光明遍照梵網云我今盧舍那方坐蓮華臺等梵語釋迦牟尼此云能仁寂默然此三名不可定執晉譯華嚴皆盧舍那唐譯皆稱毗盧遮那華嚴又云或名釋迦或名遮那等只是梵音不同耳雖有三名本無異體然此三身各論單複法身單唯指本覺性體報身單指始覺智圓化身單指慈悲應現法身複者一者自性清淨法身二者離垢妙極法身報身複者一者自受用報身即諸佛智斷二德究竟果德二者他受用報身即地上菩薩所見剎塵相好化身複者一者應現身示成八相二者變化身無而倏有示現八相又有三種一者勝應身謂地上所見亦名他受用二者帶劣勝應身即通教三乘所見三劣應身藏教所見丈六老比丘相四智者謂轉八識成四智轉第八為大圓鏡智第七為平等性智第六為妙觀察智前五為成所作智十力者一者是處非處智力知一切眾生果報因緣如作善業能得樂報名是處作惡業望於善報名非處二者知業智力知一切眾生三世所有業力三者知定智力知禪三昧四者知根智力知諸眾生上中下根五者知欲智力知諸眾生種種欲樂六者知界智力知諸眾生世間種種界分七者知至處智力知一切道至處相八者宿命智力知過去一世乃至百千萬世姓名苦樂壽夭等九者天眼智力見諸眾生生時死時善道惡道等十者漏盡智力自知我生已盡不受後有四無所畏者一者一切智無畏謂於一切諸法盡知盡見故無所畏二漏盡無畏謂佛五住究盡二死永亡故無所畏三者說障道無畏謂於障道之法能知能說故無所畏四者說苦盡道無畏謂於盡苦之道能知能說故無所畏十八不共法者唯佛一人有不與三乘共一者身無失二者口無失三者意無失四者無不定心五者無異想心六者無不知已捨心七者欲無減八者念無減九者精進無減十者智慧無減十一者解脫無減十二者解脫知見無減十三者身業隨智慧行十四者口業隨智慧行十五者意業隨智慧行十六者知過去世無礙十七者知現在世無礙十八者知未來世無礙功德者力用也凡夫者因人也者謂四教內凡外凡也因人則通等覺皆名因人具足無量恒沙煩惱者見思煩惱塵沙煩惱無明煩惱恒沙業繫者謂有漏業無漏業亦有亦無漏業造業必感苦果故名為繫恒沙生死者謂分段變易二種生死業多生死亦多也迷悟者真中二種迷悟也譬彼雲泥者天地懸殊也生佛分於迷悟竟二迷悟依於心性而言究竟無二者謂據相而言則不二而二約性而論則二而不二蓋諸佛乃悟眾生心內諸佛眾生乃迷諸佛心內眾生所以悟者悟眾生本具性體性量性具也所以迷者迷諸佛所證性體性量性具也據相而言者謂按俗諦中事相而言也不二而二者修德不同故即而常自六也約性而論者約真諦理性而言也二而不二者性德體一故六而常自即也蓋諸佛下明不二所以也諸佛者乃四教佛法報應化也乃悟眾生心內諸佛者謂法佛乃眾生心內性體諸佛報佛乃眾生心內性量諸佛應化乃眾生心內性具諸佛眾生者乃四教眾生謂九法界乃迷諸佛心內眾生者謂菩薩乃諸佛心內無明眾生二乘乃諸佛心內塵沙眾生六凡乃諸佛心內見思眾生此明能迷能悟也所以下明所迷所悟也譬如依方故悟依方故迷所以悟者悟眾生本具性體性量性具者謂法佛悟性體報佛悟性具應化悟性量又法佛圓悟報佛次第悟應化體析悟也所以迷者迷諸佛所證性體性量性具者謂菩薩迷性體二乘迷性具六凡迷性量又六凡全迷二乘迷俗中菩薩迷中道迷悟依於心性竟三心性體不受迷心性之妙豈受其迷迷而不迷斯言有在非唯不受其迷而亦不受其悟喻如定方原無動迷悟在於人約人有迷悟方不屬迷悟雖不屬迷悟而亦不離迷悟故曰迷而不迷斯言有在亦可言悟而不悟也心性體不受迷竟四稱性行無虗棄故眾生本有性體即諸佛所證法身性量即報身性具即應身四智十力四無所畏十八不共等功德會合可知故古德云諸佛心內眾生塵塵極樂眾生心內諸佛念念證真故彌陀即我心我心即彌陀未舉念時早已成就纔舉心念即便圓成感應道交為有此理故念佛人功不唐捐會合可知者三身已會合四智者鏡智即法身乃性體平等智即報身乃性量成事智即應身乃性具觀察智通三身十力四無所畏不共法等各分四教四教合三身可知矣故古德云者引古證也塵塵極樂者眾生即佛故念念證真者佛即眾生故由其佛即眾生故彌陀即我心矣由其眾生即佛故我心即彌陀也未舉念時早已成就者性德本然也纔舉心念即便圓成者修德合性故曰一念相應一念佛念念相應念念佛也感應道交二句者我為能感佛為所感佛為能應我為所應為有此不二之心焉生佛不二門竟五法界為念門二初偈頌二論文今初法界圓融體作我一念心故我念佛心全體是法界法界圓融體者即事事無礙法界之體也豎窮橫徧故曰圓法法無礙故曰融作我一念心者亦可說一念境一念香一念華等無不可也全體是法界者四種法界也所念即事法界能念即理法界能所不二即理事無礙法界具足三千即事事無礙法界也二論文二初正辯念體二結示淨宗初又三初正辯二引證三況顯今初論曰行者稱佛名時作佛觀時作主伴依正餘觀時修三種淨業時一心不亂時散心稱名時以至見思浩浩恒沙煩惱凡此有心皆由真如不變隨緣而作全體即是法界三種淨業者一者孝養父母奉事師長慈心不殺修十善業二者受持三皈具足眾戒不犯威儀三者深信因果讀誦大乘勸進行者見思者謂見思二惑見謂身邊邪見戒思謂貪嗔癡慢疑恒沙煩惱謂煩惱無盡也徹祖十門大旨曰然於十門之中第五一門為最要以事理總別性修橫豎等義舉不外此一念以是全體法界故是故學者但能於此一門洞明則前後諸門盡在是矣今略為點示先示本科行者正當稱名時便是作佛觀時謂一心專注洪名便是能觀所觀此中具足十法成乘所念洪名即不思議境能念即不思議菩提之心能所不二即不思議止觀念念相應即破法遍若達此意即識通塞能念即念所念即處即四念處念念相續莫令不相續即正勤若功行熟即如意足以功行純熟即五根生根生故力用長即五力念念覺照即七覺分安隱而行即八聖道此道品調適行住坐臥懇禱禮拜即對治助開須識六即位次莫起上慢莫令妄想所動即能安忍以往生為期即離法愛此即十乘觀法亦是作主伴依正餘觀時觀經疏云觀雖十六言佛便周謂以主攝伴以正攝依也亦是修三種淨業時謂我今念佛求生者正為過去無盡父母故無盡師長故無量眾生故念念之中具足如是三心一句洪名乃上上品十善即此便是一體三皈念念相續便具足眾戒行住坐臥不離乃不犯威儀念佛為因淨土為果正當念念相續即大乘經典即此心佛即第一義諦亦以此勸進行者亦是見思浩浩時煩惱不曾斷故此略點本科再點十門既曰法界全體便是一真法界門所念之佛即性具能念之心即性量能所不二即性體此即三諦能念屬身所念屬土能所惟一緣起即身土緣起門即能是所即所是能即心土相即門能念是生所念是佛能所不二即生佛不二門能念是觀所念是境離能無所離所無能即境觀相吞門境為妙假觀為空境觀雙亡即是中即三觀法爾門能念為感所念為應即感應任運門能念是此所念是彼能所不二即彼此恒一門念佛時即往生時即成佛時即度生時豎窮三際即現未互在門再示釋題一聲佛號圓具彌陀三身四土正當念時便圓淨四土圓見三身亦圓轉五濁圓證三不退故文云以此妙心念彼阿彌則彼三身何身不念求彼四土何土不生即釋淨土一聲佛號即佛界大緣起佛界既起九亦同彰即示緣起一聲佛號全佛即心即唯心之宗全心即佛即唯佛之宗非心非佛即絕待之宗即心即佛即圓融之宗無有思量分別即超情離見之宗即明宗旨念佛時即成佛時自然超出三乘權益即顯勝益正當念時全體是生唯是一心則無生非心非佛則非生非無生心佛宛然則亦生亦無生圓該四句而又圓超四句而又正圓該時便圓超正圓超時便圓該圓該圓超同時無礙生無生論也示釋題竟稱佛名時如此作佛觀時乃至見思浩浩無不皆然介爾有心三諦具足故是法界全體也正辯竟二引證故法智大師云法界圓融不思議體作我一念之心亦復舉體作生作佛作依作正三況顯若然者餘心尚是況念佛心乎餘心者謂見思煩惱心眾生心尚是況佛心乎正辯念體竟二結示淨宗又二初示理本圓妙二示行有等差今初是故行者念佛之時此心便是圓融清淨寶覺以此妙心念彼阿彌則彼三身何身不念求彼四土何土不生圓融清淨寶覺者即法界圓融不思議體所念即法身能念即般若能所不二即解脫三德念念具足故曰圓融不可思議故曰清淨此心便是妙覺之體故曰寶覺生佛不二故曰念彼三身何身不念身土不二故曰何土不生若不然者不稱妙心也理本圓妙竟二示行有等差但隨功行淺深品位高下耳上文明即事之理理本圓妙此乃示即理之事事有等差理本圓妙故六而常即事有等差故即而常六是故須分六即之義也若功行至觀行位則生同居淨土分三輩九品通惑未斷故見彌陀應化身若至相似位則生方便淨土四住雖落六塵本空故見彌陀勝應身若至分證位則生實報淨土亦名分證寂光淨土見佛報身亦見法身雖生彼土即生自土雖見他身即見自身自他不二故曰唯心淨土自性彌陀也法界為念門竟六境觀相吞門二初偈頌二論文今初十六等諸境事理兩種觀彼此互相吞如因陀羅網十六諸境者十六妙觀也初日輪懸鼓觀乃至第六總觀為依報觀第七華座觀至十三雜觀為正報觀十四至十六為九品往生觀此十六諸境妙宗以事理二觀釋彼經文事觀則但觀十六事境觀成則隨位往生理觀則了知十六唯是一心故曰是心作佛是心是佛等也觀成亦隨位往生若欲詳細當觀妙宗茲不具錄如因陀羅網者因陀羅帝釋天之名也具云釋迦提婆因陀羅此云能天主此天有網故曰因陀羅網二論文二初正辯相吞二結示淨宗初又三初標有本二明由致三示行相今初論曰境觀相吞者正由事事無礙也事事所以無礙者所謂有本者如是也有本者即下文由致乃明其本也今先明事事無礙觀藕益大師釋觀想偈云能禮所禮性空寂感應道交難思議我此道場如帝珠等六句以明互遍互具妙觀深顯事事無礙法界也且初能禮即我之三業謂身業翹勤口業專至意業恭敬此三並是因緣生法凡屬緣生悉皆無性謂非自他共離故其性空寂由空寂故方成能感即寂而感即感仍寂故難思議其所禮者即佛菩薩等三身此三並是因緣生法無性故空寂空寂故方成能應即寂而應即應仍寂故難思議如兩鏡相照由明淨故方能互現互為能照互為所照感應之道交亦復如是兩鏡中影雖各各重重無盡而無出入亦無往來法性本然詎可思議達此不思議法性已方知我之一室道場本與法界虗空界等十方三世諸佛菩薩無不炳現此一室中猶如帝珠普現一切又知十方三世諸佛菩薩道場海會無不皆然亦如帝珠普現一切故我此身雖在於此決定普於一切諸佛菩薩之前而現其影此則不唯一身禮一佛亦復一身遍禮一切佛亦復一切身互禮一切佛稱性互遍稱性互具此無盡身雲人人本具不俟安排而後然我之身雲既然佛菩薩身雲亦爾正報既爾依報亦然故為事事無礙法界也標有本竟二明由致蓋由法界圓融不思議體作我一念之心亦復舉體作生作佛作依作正既皆全體而作有何一法不即法界故曰一塵法界不小剎海法界不大多亦法界少亦法界由謂因由致謂理致事事所以無礙者蓋由其法界圓融不思議不理致也圓融不思議體者即一真法界也事事無礙者蓋由性具即性體性量故也作我一念心者舉法界全體作我一念能修之心法非法界少分此心既法界全體便即豎窮橫徧也亦復舉體作生作佛作依作正者亦舉法界全體作所觀之生法佛法依法正法亦非法界少分乃至一塵一芥法法皆然既皆全體而作有何一法不即豎窮橫徧故曰一塵法界不小剎海法界不大法界無大小故多亦法界少亦法界法界無多少故法法既皆豎窮橫徧而無妨礙故為事事無礙法界也明由致竟三示行相是以西方十六諸境吾心事理二觀一一無非法界全體如帝釋宮中因陀羅網雖彼此各是一珠而影入眾珠雖影入眾珠而東西照用有別境觀亦然以境為事則觀為理理能包事是為以觀吞境以觀為事則境為理理能包事是為以境吞觀若觀若境或一為事餘為理或一為理餘為事彼此互各相吞故如因陀羅網文分三節初明圓融理二引圓融喻三合圓融觀是以西方十六諸境吾心事理二觀一一無非法界全體者正明法界圓融理也是以者承上文義也十六諸境無非法界全體者所觀之境皆是性體性量也事理二觀無非法界全體者能觀之心亦是性體性量也性體清淨故能互含性量周遍故能互遍以互遍互含故能互吞互為能吞互為所吞重重無盡即成事事無礙之理以此而為所觀故前文互遍互具妙觀云如兩鏡相照由明淨故方能互現互為能照互為所照法性本然詎可思議達此不思議法性已方知我之道場本與法界虗空界等十方三世諸佛菩薩無不炳現此道場中猶如帝珠普現一切也如帝釋宮下引喻也此法界體湛然清淨無可比況且以帝珠為喻也此中喻具四法界珠體喻事法界彼此各是一珠故珠光喻理法界能含影故影入眾珠喻理事無礙法界影影皆豎窮橫徧重重無盡喻事事無礙法界梵網合註云一珠影現一切珠一切珠中一珠影一切珠中一切珠一珠各住一珠位也東西照用有別者一珠各住一珠位也境觀亦然者合圓融妙觀也以境為事者以所觀之境為事法界如珠中之影以觀為理者以能觀之智為理法界如珠光理能包事者如光能含影是為以觀吞境即下文謂西方依正已在我觀之內也以觀為事者以能觀智為事法界如珠影以境為理者以所觀境為理法界如珠光理能包事者如光能含影是為以境吞觀下文云我今身心已在依正之中若觀若境或一為事者謂若能觀若所觀一總為事法界如影餘為理者餘十五境為理法界如光亦理能包事如各各珠光皆含一切影或一為理者能觀所觀一總為理法界如光餘十五境為事法界如影亦理能包事如一珠光含一切影彼此互各相吞者顯重重無盡互遍互具事事無礙妙觀也正辯相吞竟二結示淨宗若然者當我作觀時則西方依正已在我觀之內我今身心已在依正之中了此而求生安養可謂雁過長空影沉寒水雁絕遺蹤之意水無留影之心此結淨宗生而無生無生而生之意也當我作觀時者正當修觀時以例禮懺供養看經念佛回向發願坐禪等時淨業既爾乃至造惡業無不皆然也我此道場如帝珠西方依正諸境已在我觀之內西方依正亦如帝珠我今身心諸業已在依正之中法性法爾如是故修觀時始照知故若了此義則知生則決定生生而無生去則實不去不去而去也又復例知彌陀接則決定接接而不接來則實不來不來而來之意也故天衣懷禪師示眾曰禪宗則曰無生淨土則曰有生還是生耶還是無生耶則曰生則決定生去則實不去譬如雁過長空影沉寒水雁絕遺蹤之意水無留影之心雁過長空影沉寒水喻生則決定生雁絕意水無心中間無來往之相則喻去則實不去也又雁絕遺蹤之意雖喻無生而蹤自遺則喻無生而自生也水無留影之心喻佛不來接而影自留則喻不接而自接也慈善根力任運如是非作意神通也境觀相吞門竟七三觀法爾門二初偈頌二論文今初能觀為三觀所觀即三諦全性以起修故稱為法爾能觀為三觀者乃全性體性量性具三諦性德起成三觀之修德全三觀之修德還照三諦之性德故曰全性起修全修在性性修不二止觀大意云三諦三觀三非三三一一三無所寄諦觀名別體復同是故能所二非二故稱法爾二論文分二初正明三觀二結示淨宗初又二初別論二總論初又二初雙標諦觀二別論諦觀今初論曰三諦者真俗中也三觀者空假中也諦者諦審也謂諦審諸法即空假中即空是性量之真諦即假是性具之俗諦即中是性體之中諦此三隔歷即次第三諦三一圓融即圓融三諦觀者照了之義照真即空觀照俗即假觀照中即中觀此三隔歷即次第三觀三一無礙即圓融三觀雙標諦觀竟二別論諦觀又二初別論三諦性德二別論三觀修德初又三初尅論三諦二會歸一心三結成性德今初忘情絕解莫尚乎真隨緣應用莫尚乎俗融通空有莫尚乎中真即真空泯一切法之謂也蓋諸法本空眾生不了執之為實而生妄見若以空觀蕩之則謂實之情解自忘故曰忘情絕解莫尚乎真也俗即世俗立一切法之謂也諸法雖即本空若以假觀照之則能諦了性具諸法歷歷宛然故曰隨緣應用莫尚乎俗也中即中正統一切法之謂也諸法本來不即二邊不離二邊若以中觀觀之則能諦了諸法非真非俗即真即俗圓融無礙即一而三即三而一不可思議故曰融通空有莫尚乎中也尅論三諦竟二會歸一心虗靈不昧此吾心自空者也物來斯應此吾心自有者也空有相即此吾心自中者也虗靈不昧者隨緣而常自不變也物來斯應者不變而常自隨緣也空有相即者即隨緣而不變即不變而隨緣也會歸一心竟三結成性德此性也非修也三諦也非三觀也別論三諦性德竟二別論三觀修德三初分別行相二顯示圓融三結成修德今初修之者稱性照了也故體達此心空洞無物謂之空照了此性具足萬法謂之假融通二邊不一不異謂之中修之者標其修德別其性德也稱性照了者謂修德之功稱乎性德之理也體達此心者謂體空觀也體達此隨緣之心常不被物所變故曰空洞無物謂之空也照了此性者妙假觀也謂照了此不變之性常隨萬法之緣故曰具足萬法謂之假也融通二邊者圓融觀也性是體心是用故不一離體無用離用無體故不異故曰不一不異謂之中也分別行相竟二顯示圓融然則即虗靈而應物也即應物而虗靈也空即假中也假即空中也中即空假也然則者承上文而言也三觀唯是一心故曰相即即虗靈而應物者即體是用也即應物而虗靈者即用是體也體用唯是一心故曰三觀相即顯示圓融竟三結成修德是稱性而修也絕待而照也不思議之三觀也首楞嚴大定之司南也此別論也如此稱性而修者性修不二也絕待而照者能所不二也不思議三觀者三觀不二也首楞嚴大定司南者因果不二也梵語首楞嚴此云究竟堅固即果覺異名司南者定南鍼也以一心三觀乃大定之因故曰司南也別論竟二總論二初分別行相二顯示圓融今初若總論者或以吾心虗靈者為空以所觀萬物者為假以心境不二者為中上文別者乃別論觀心今文總者總其心境唯是一性也心性無相故為空變作諸法故為假即心即境即境即心故曰不二為中也分別行相竟二顯示圓融物吾心之物也何假而不空心萬物之心也何空而不假即心即物即物即心何中而不空假當是何空假而不中物吾心之物何假而不空者謂所觀之境乃心性所變之境何假何中而不即空乃即性具性體是性量也心萬物之心何空而不假者謂能觀之心乃境性能變之心何空何中而不即假乃即性量性體是性具即心即物即物即心何空假而不即中者謂心性境性唯只一性故曰何空何假而不即中乃即性量性具是性體也正明三觀竟二結示淨宗是以觀極樂依正者以吾一心之三觀觀彼一境之三諦無不可者以吾三觀之一心照彼三諦之一境亦無不可者虎溪大師曰境為妙假觀為空境觀雙忘即是中忘照何嘗有先後一心融絕了無蹤尚何三觀之不法爾乎以吾一心之三觀觀彼一境之三諦者乃理觀也亦別觀也以吾三觀之一心照彼三諦之一境者乃事觀也亦總觀也亦即專稱名號也然此淨宗唯在發願求生是故總觀別觀皆無不可也虎溪大師乃元朝虎溪懷則法師述一心三觀頌曰境為妙假云云境為妙假者即心也觀為空者即境也境觀雙亡者非心非境也亡照何嘗有先後者遮照同時也一心融絕了無蹤者唯一中道妙心更無空假之蹤迹也既日用中具足三觀尚何不法爾乎三觀法爾門竟八感應任運門二初偈頌二論文今初我心感諸佛彌陀即懸應天性自相關如磁石吸鍼感應之相略明四句一者冥感冥應謂過去善修三業現在未運身口藉往善力為冥感也雖不現見靈瑞密為法身所益不見不聞而覺而知是為冥應也二者冥感顯應者過去殖善為冥感已成便得值佛聞法現前獲利是為顯應如佛初出世先得度者現在何嘗修行如來照其宿機自往度之即其義也三者顯感顯應現在身口精勤不懈而能感降如須達長跪佛往祇園又如道場禮懺能感靈瑞即顯感顯應也四顯感冥應者如人一世勤苦現善濃積而不顯應冥有其利此顯感冥應也若解四意一切低頭舉手則知福不虗棄終日無感終日無悔若見喜殺長壽好施貧乏不生邪見若詳論者則有三十六句等種種義也天性者佛性也相關者連係也有二種相關謂天性誓願也我於諸佛但有天性相關我於彌陀則有二種故於彌陀最有緣也磁石者吸鐵石山之陽產鐵山陰必有磁石二物同氣故也二論文分三初天性相關二誓願相關三結示淨宗今初論曰諸佛眾生同一覺源迷悟雖殊理常平等故曰諸佛是眾生心內諸佛眾生乃諸佛心內眾生迹此而言則諸佛眾生心精無時而不通脗但諸佛無時不欲度生而眾生念念與之迷背故勢至菩薩曰一人專憶一人專忘若逢不逢或見非見子若憶母如母憶時母子歷生不相違遠若眾生心憶佛念佛現前當來必定見佛去佛不遠正由一理平等天性相關故得任運苦與樂文分三節初正明二引證三總結初中同一覺源者同一天性也脗者脗合即相關也第二引證中有事理二意今但約事釋一人專憶喻佛常欲度生一人專忘喻眾生念念迷背佛常欲度生故若逢念念迷背故不逢逢故見不逢故不見此喻理即位也子若憶母喻眾生常念佛喻名字觀行相似位也如母憶時母子歷生不相違遠喻分證位若眾生心憶佛念佛現前當來必定見佛去佛不遠此以法合喻也現前見佛如遠公三覩聖像當來見佛或命終時見或於淨土見去佛不遠者去自果佛不遠也第三總結一理即天性也苦與樂者悲能九界苦集二諦之苦慈能與佛界道滅二諦之樂也天性相關竟二誓願相關況無量壽佛因中發四十八願誓取極樂攝受有情今道果久成僧那久滿故凡百眾生弗憂佛不來應但當深信憶念數數發願願生西方如磁石與鍼任運吸取然磁能吸鐵而不能吸銅鍼能合磁而不能合玉譬猶佛能度有緣而不能度無緣眾生易感彌陀而不易感諸佛豈非生佛誓願相關者乎文分二節初明誓願二明相關按無量壽經過去久遠世自在王佛世中有一國王聞佛說法心懷悅豫發無上道意棄國捐王而作沙門號曰法藏詣世自在王佛所求佛說法時世自在王佛廣說二百一十億諸佛剎土天人之善惡國土之粗妙應其心願悉現與之時彼比丘聞佛所說嚴淨國土皆悉覩見發無上願具足五劫思惟攝取莊嚴國土清淨之行如是修已詣彼佛所白佛言唯願聽察如我所願當具說之故發四十八種大願誓取極樂攝受有情說有一願不滿不取正覺今道果久成僧那者此云宏誓也此明誓願然磁能下明相關也然諸佛度生原無揀擇而因中願力不同結緣有異故有相關不相關者彌陀因中願勝與此土眾生緣深故誓願相關也誓願相關竟三結示淨宗是故求生淨土者信願行三缺一不可彌陀要解云信願為慧行持名為行行得生與否全由信願之有無品位高下全由持名之深淺是故信願為前導持名為正修如目足並運也感應任運門竟九彼此恒一門二初偈頌二論文今初若人臨終時能不失正念或見光見華已受寶蓮生普賢行願品云又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等所共圍繞其人自見生蓮華中蒙佛授記此中能不失正念者正謂唯此願王不相捨離也此實在操之有素也二論文分三初舉事二顯理三引證今初論曰往生傳云張抗仕石晉為翰林學士課大悲呪十萬遍願生西方一日寢疾唯念佛號忽謂家人曰西方淨土秪在堂屋西邊阿彌陀佛坐蓮華上見翁兒在蓮華池金沙地上禮拜嬉戲良久念佛而化翁兒抗之孫也石晉者後晉也高祖石敬塘後唐明宗之壻借遼兵而滅唐有天下改稱為晉也舉事竟二顯理二初尅本體直示唯心二就行人點示唯心今初所以爾者蓋西方極樂世界乃吾心中之一土耳娑婆世界亦吾心中之一土耳約土而言有十萬億彼此之異約心而觀原無遠近所以爾者承上文西方秪在堂屋西邊而言也極樂者乃吾心之淨土心淨故所以土淨也娑婆者乃吾心之穢土心穢故所以土穢也約土而事論而有彼此之幻相約心而理論彼亦唯心此亦唯心原無遠近也直示唯心竟二就行人點示唯心但眾生自受生以來為五陰區局真性不契心源念佛之人果報成熟將捨現陰趣生陰時淨土蓮華忽然在前唯心境界非有去來彼此之相自受生以來者謂從無始以來也為五陰區局真性不契心源者被色受想行識分隔真如實性也謂六凡五陰區局真諦性不契性量之源二乘五陰區局俗諦之性不契性具之源菩薩五陰區局中諦之性不契性體之源現陰者現在五陰也趣生陰者趣淨土清淨五陰也陰有四種謂現陰命終時名死陰死陰後生陰前名中陰投胎時名生陰又名四有大善大惡不落中陰今念佛人直趣生陰者不落中陰也捨現陰趣生陰故曰生則決定生唯心境界無有去來故曰去則實不法也顯理竟三引證二初引經證二引古證今初故首楞嚴經云臨命終時未捨暖觸一生善惡俱時頓現純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生大佛頂經云一切眾生實本真淨因彼妄見有妄習生因此分開內分外分阿難內分即是眾生分內因諸愛染發起妄情情積不休能生愛水是故眾生心憶珍饈口中水出乃至心著行婬男女二根自然流液諸愛雖別流結是同潤溼不升自然從墜此名內分阿難外分即是眾生分外因諸渴仰發明虗想想積不休能生勝氣是故眾生心持禁戒舉身輕清乃至心存佛國聖境冥現阿難諸想雖別輕舉是同飛動不沉自然超越此名外分阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現云云未捨暖觸者即前文云最後剎那第八識趣生陰時也善惡頓現者亂心位也純想即飛者謂純是虗想不能從墜也若飛心中謂上升心中也兼福兼慧及與淨願者平日所修福慧並發求生淨願也自然心開者一切境界無有障礙也無障礙故所求淨土自現隨願力往生也下文還有一情九想二情八想乃至純情無想隨情想二分判其升沉茲不具錄也引經證竟二引古證法智大師云須知垂終自見坐金蓮身已是彼國生陰亦此意也彼此恒一門竟第十現未互在門二初偈頌二論文今初行者今念佛功德不唐捐因中已有果如蓮華開敷蓮華開敷者喻因果同時也華開蓮現故曰因中有果功德不唐捐也二論文二初約心法圓融明互在二約心性常住明互在今初論曰圓頓教人頓悟心性無修而修修彼樂性中所具極樂由修顯發而此心性豎貫三際橫裹十虗佛法生法正法依法因法果法一念圓成是以念佛之人名為全性起修全修在性全性起修雖名為因全修在性因中有果以所具因法與所具果法同居一念心性圓融無法不攝故如蓮華開敷華中有果頓悟心性無修而修修彼樂者頓悟隨緣不變之性雖然無修然而不變隨緣之用無所不修以性中所具法身之極樂由般若解脫二種修德而顯發故也佛法生法正法依法因法果法一念圓成者理具事造兩重三千同居一念也由同居一念故是以念佛之人名為全法身之性德起成般若解脫二種修德全二種修德仍在法身之性德中約修德而論雖名為因約性德而言因中有果以因法果法同居一念故也理具三千因法事造三千果法同居一念故曰心性圓融無法不攝猶如蓮華開敷華喻因蓮喻果華開蓮現喻因果同居一時故現未互在也心法圓融明互在竟二約心性常住明互在況此心常住無生滅去來即今念佛之心便是當來華池受生之時故說初發心人極樂寶池已萌蓮種若精進不退日益生長華漸開敷隨其功德大小輝煌其或懈退悔雜日漸憔顇若能自新華復鮮麗其或不然芽焦種敗且此蓮華人誰種植現未互在斯言有歸也越國夫人王氏宋哲宗從父荊王之妻也專修淨土晝夜無間導諸妾婢并志西歸中有一婢獨懈慢夫人曰不可以爾一人壞我規矩擯之婢悚悔遂發憤精進久之不倦一日謂同事曰吾其行矣夜聞異香滿室無疾而逝越宿同事者告夫人夜夢化去之婢令致謝夫人幸蒙訓責得生西方感德無量夫人曰彼能入我夢乃可信爾其夕夫人夢婢致謝如前夫人曰西方可至乎婢曰可遂導夫人行頃之見一大池有蓮華大小間錯或榮或悴夫人問其故婢曰世間修西方者纔發一念此中便生一華勤惰不同榮悴亦異精進者榮怠廢者悴若歷久不息念熟觀成形消神謝決生其中中有一人朝服而坐寶冠瓔珞莊嚴其身夫人問曰何人也婢曰楊傑也又一人朝服而坐夫人又問何人曰馬玗也兩人俱修淨業事具本傳夫人曰我當生何處婢導之行可數里望見一華臺金碧晃耀光明洞然婢曰此夫人生處乃金臺上品上生也既覺悲喜交至其年遇生日晨起秉爐焚香望觀音閣而立諸眷方趣前為壽眡之則已化去矣現未互在門竟舊䟦幽溪大師中興天台教觀以性具圓理闡淨土法門著為生無生論初開演於新昌石城寺每一登座天樂盈空大眾同聞事非虗誑誠可謂離五濁之大津梁登九蓮之勝方便正知於丁巳年春歸依大師即蒙相授旋梓流通後因板寄慧慶遂復久置高閣今與十疑寶王重梓合成淨土三論伏願見聞隨喜盡斷狐疑遂成三昧寶王頓悟無生法忍親覲彌陀等蒙授記比丘正知識䟦語原夫三界唯心萬法唯識唯心唯識是開閉閫入涅槃趣無生之關鑰也教乘云法不孤起假因緣凑巧而生古今佛祖同一鼻孔出氣無非拯眾生為大事因緣故種種粗言細語循循善誘導歸覺岸獲無生忍之意也天台幽溪老人造論發揮淨土布列十門彰顯妙有之宗演唱無生之曲言簡義週事確理圓性相融通橫該八教豎徹五時托底掀翻究竟極譚可謂皓月懸於晴空無暗不燭者也題名會集者乃紅螺亮座主為法情深婆心切切咸繇時當末劫法運垂秋後進根淺機鈍智力微弱妙義難達上不契佛祖之聖意下不領會於自心故此以善巧妙智採薈經教撮集祖語隨時應症染指即效九品金地如在掌中花池寶所似現目前誠能救濟貧乏之良方也苟能公諸同好若將此書執持勤撥展轉流通庶不負亮公大師苦心不昧熱血無乾闡揚法道永不墜落自性彌陀唯心淨土去則不遠西方極樂勝莊嚴者乃生無生論會集也矣時於道光二十九年季冬紅螺山二有丈室蓮村氏敬識
