front:
  text: 淨土生無生論會集序夫淨土者確實而言非是生亦非無生也何則淨土者乃心性之異名也本無惑染強名曰淨眾生依止強名曰土既是自心則生與無生皆成戲論矣今言生者乃大慈悲父為兒女心重於第二門頭苦與樂之謂乃生滅門意也又言無生者乃古善知識為佛法情深依第一義諦應病下藥乃真如門意也二門唯是一心說甚生及無生也然而一心具足二門不妨生與無生也是故古人喚作倚門望子也若如此會得則能圓超四句圓該四句絕待圓融不可思議自然超情離見免墮如藤依樹之誚若觸火聚之譏也嗟乎是時也正值法苑秋晚僧海冬深獅子蟲徧於霜林水潦鶴充滿冰海縱然佛祖再出亦無門可望矣我輩何人敢鼓舌搖唇亦只為支持門庭事不獲己耳問汝何人也不自忖量敢作註解耶答我亦非何人實亦不敢作註解今是書也乃於病苦之暇集些殘羮㴼飯只欲自餐自飲不意旁觀有不嫌酸臭者逼而奪之非不自量也然是㴼飯也雖不可飽人之口而於我等譏餓者不無小補今題曰會集者謂釋題一科皆出徹祖之筆若不集之恐失傳也論中著述盡採台宗之意若不會之恐失詳也今會而集之作斯名焉道光己酉年清和月紅螺山慕蓮學人達默述
